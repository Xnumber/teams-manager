<h2>ТѕљтЊАуІђТЁІ</h2>




<dx-data-grid #dataGrid [dataSource]="usersDataSource" [columns]="columns"
	[editing]="{ allowUpdating: false, allowAdding: false, allowDeleting: false, mode: 'popup' }" [showBorders]="true"
	(onOptionChanged)="onOptionChanged($event)">
	<dxo-paging [enabled]="true" [pageSize]="10"></dxo-paging>
	<dxo-filter-row [visible]="true"></dxo-filter-row>
	<dxo-search-panel [visible]="false"></dxo-search-panel>
</dx-data-grid>

<div class="flex-row">
	<div class="flex-1">
		<dx-chart [dataSource]="userTasksChartDataSource$ | async"
			[commonSeriesSettings]="{ argumentField: 'username', type: 'bar' }" [title]="{ text: 'ТѕљтЊАтЙЁУЙдтиЦСйю'}"
			[rotated]="true">
			<dxo-tooltip [enabled]="true" [customizeTooltip]="customTooltip">
			</dxo-tooltip>
			<dxi-series valueField="left_tasks" name="тЙЁУЙдтиЦСйю"></dxi-series>
			<dxo-argument-axis>
				<dxo-label [overlappingBehavior]="'none'">
				</dxo-label>
			</dxo-argument-axis>
		</dx-chart>
	</div>
	<div class="flex-1">
		<dx-chart [dataSource]="userProjectsChartDataSource$ | async"
			[commonSeriesSettings]="{ argumentField: 'username', type: 'bar' }" [title]="{ text: 'ТѕљтЊАтЈЃУѕЄт░ѕТАѕТЋИ'}"
			[rotated]="true">
			<dxo-tooltip [enabled]="true" [customizeTooltip]="customTooltip">
			</dxo-tooltip>
			<dxi-series valueField="project_count" name="тЈЃУѕЄт░ѕТАѕТЋИ"></dxi-series>
			<dxo-argument-axis>
				<dxo-label [overlappingBehavior]="'none'">
				</dxo-label>
			</dxo-argument-axis>
		</dx-chart>
	</div>
</div>
