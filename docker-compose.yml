services:

  postgres:

    image: postgres:16

    container_name: postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: appdb

      POSTGRES_USER: app

      POSTGRES_PASSWORD: password

    volumes:

      - postgres-data:/var/lib/postgresql/data

#      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:

      - appnet

  backend:

    build:

      context: ./drogon

    container_name: drogon

    restart: unless-stopped

    depends_on:

      - postgres

    ports:

      - "8080:8080"

    networks:

      - appnet

  frontend:

    build:

      context: ./angular

    container_name: angular

    restart: unless-stopped

    expose:

      - "80"

    networks:

      - appnet

  nginx:

    image: nginx:alpine

    container_name: nginx

    restart: unless-stopped

    depends_on:

      - frontend

      - backend

    ports:

      - "80:80"

      - "443:443"

    volumes:

      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:

      - appnet

volumes:

  postgres-data:

networks:

  appnet: