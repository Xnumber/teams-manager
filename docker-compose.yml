services:

  postgres:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - appnet

  backend:
    build:
      context: ./drogon
    ports:
      - "8080:8080"
    networks:
      - appnet

  frontend:
    build:
      context: ./angular
    expose:
      - "80"
    networks:
      - appnet

  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

volumes:
  postgres-data:

networks:
  appnet: